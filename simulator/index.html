<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyBot v3.0.0 — Risk-First Copy Trading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --bg-panel: #161b22;
    --bg-input: #0d1117;
    --border: #30363d;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --blue: #3b82f6;
    --cyan: #06b6d4;
    --white: #e6edf3;
    --gray: #8b949e;
    --dim: #484f58;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    color: var(--white);
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .terminal-window {
    width: 100%;
    max-width: 900px;
    height: 100%;
    max-height: 700px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .title-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: linear-gradient(180deg, #1f242c 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  .traffic-lights {
    display: flex;
    gap: 8px;
  }
  .traffic-lights span {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
  }
  .tl-red { background: #ff5f56; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.2); }
  .tl-yellow { background: #ffbd2e; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.2); }
  .tl-green { background: #27c93f; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.2); }
  .title-text {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-weight: 600;
    color: var(--gray);
    letter-spacing: 0.3px;
  }
  .title-bar-spacer { width: 52px; }
  .terminal-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px;
    font-size: 13px;
    line-height: 1.6;
    scroll-behavior: smooth;
  }
  .terminal-body::-webkit-scrollbar { width: 8px; }
  .terminal-body::-webkit-scrollbar-track { background: transparent; }
  .terminal-body::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 4px; }
  .line { white-space: pre-wrap; word-break: break-word; margin-bottom: 1px; }
  .prompt-line { display: flex; align-items: baseline; margin-top: 4px; }
  .prompt { color: var(--green); font-weight: 600; margin-right: 8px; flex-shrink: 0; }
  .input-area {
    display: flex;
    align-items: baseline;
    flex: 1;
    min-width: 0;
  }
  #cmd-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--white);
    font-family: inherit;
    font-size: 13px;
    line-height: 1.6;
    flex: 1;
    caret-color: var(--green);
    min-width: 20px;
  }
  .cursor {
    display: inline-block;
    width: 8px;
    height: 1.15em;
    background: var(--green);
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
    flex-shrink: 0;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .cmd-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-panel);
  }
  .cmd-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--gray);
    font-family: inherit;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .cmd-btn:hover {
    border-color: var(--green);
    color: var(--green);
    background: rgba(34,197,94,0.08);
  }
  .cmd-btn:active { transform: translateY(1px); }
  .green { color: var(--green); }
  .red { color: var(--red); }
  .yellow { color: var(--yellow); }
  .blue { color: var(--blue); }
  .cyan { color: var(--cyan); }
  .gray { color: var(--gray); }
  .dim { color: var(--dim); }
  @media (max-width: 640px) {
    body { padding: 8px; }
    .terminal-window { border-radius: 8px; max-height: none; }
    .terminal-body { padding: 10px 12px; font-size: 12px; }
    .title-text { font-size: 11px; }
    .cmd-btn { padding: 4px 8px; font-size: 11px; }
    #cmd-input { font-size: 12px; }
  }
</style>
</head>

    <button class="cmd-btn" data-cmd="portfolio">portfolio</button>

</div>

  let historyIndex = history.length;
  let isTyping = false;
  let typingQueue = [];
  let currentPrompt = null;

  function saveHistory() {
    localStorage.setItem('polybot_history', JSON.stringify(history.slice(-50)));
  }

  function scrollToBottom() {
    terminal.scrollTop = terminal.scrollHeight;
  }

  function createPrompt() {
    const line = document.createElement('div');
    line.className = 'prompt-line';
    line.innerHTML = '<span class="prompt">polybot&gt;</span><div class="input-area"><input type="text" id="cmd-input" autocomplete="off" spellcheck="false" /><span class="cursor"></span></div>';
    terminal.appendChild(line);
    const input = line.querySelector('#cmd-input');
    input.focus();
    input.addEventListener('keydown', onInputKey);
    currentPrompt = { line, input };
    scrollToBottom();
    return input;
  }

  function removePrompt() {
    if (currentPrompt) {
      currentPrompt.line.remove();
      currentPrompt = null;
    }
  }

  function addLine(text, cls) {
    const div = document.createElement('div');
    div.className = 'line' + (cls ? ' ' + cls : '');
    div.textContent = text;
    terminal.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addRaw(html) {
    const div = document.createElement('div');
    div.className = 'line';
    div.innerHTML = html;
    terminal.appendChild(div);
    scrollToBottom();
    return div;
  }

  function typeText(text, speed = 12, onDone) {
    return new Promise(resolve => {
      const div = document.createElement('div');
      div.className = 'line';
      terminal.appendChild(div);
      let i = 0;
      function step() {
        if (i < text.length) {
          div.textContent += text[i];
          i++;
          scrollToBottom();
          setTimeout(step, speed);
        } else {
          if (onDone) onDone();
          resolve();
        }
      }
      step();
    });
  }

  function typeLines(lines, speed = 12, lineDelay = 30) {
    return new Promise(resolve => {
      let idx = 0;
      async function next() {
        if (idx >= lines.length) { resolve(); return; }
        await typeText(lines[idx], speed);
        idx++;
        setTimeout(next, lineDelay);
      }
      next();
    });
  }

    if (isHtml) addRaw(htmlOrText);
    else addLine(htmlOrText);

  async function runCommand(cmdRaw) {
    const cmd = cmdRaw.trim().toLowerCase();
    if (!cmd) return;

    if (history.length === 0 || history[history.length - 1] !== cmdRaw) {
      history.push(cmdRaw);
      if (history.length > 50) history.shift();
      historyIndex = history.length;
      saveHistory();
    }

    removePrompt();
    addLine('polybot> ' + cmdRaw, 'green');

    if (cmd === 'clear') {
      terminal.innerHTML = '';
      createPrompt();
      return;
    }

    if (outputs[cmd]) {
      const out = outputs[cmd]();
      if (out.type === 'instant') {
        // Simulate a brief typing delay for realism
        await new Promise(r => setTimeout(r, 180));
        const lines = out.html.trim().split('\n');
        for (const line of lines) {
          addRaw(line.trim());
        }
      }
    } else {
      await new Promise(r => setTimeout(r, 200));
      addLine('Unknown command: "' + cmd + '"', 'red');
      addLine('Type "help" for available commands.', 'gray');
    }

    addLine('');
    createPrompt();
  }

  function onInputKey(e) {
    const input = e.target;
    if (e.key === 'Enter') {
      const val = input.value;
      if (val.trim()) runCommand(val);
      else { removePrompt(); createPrompt(); }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIndex > 0) {
        historyIndex--;
        input.value = history[historyIndex];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIndex < history.length - 1) {
        historyIndex++;
        input.value = history[historyIndex];
      } else {
        historyIndex = history.length;
        input.value = '';
      }
    }
  }

  cmdButtons.addEventListener('click', e => {
    if (e.target.classList.contains('cmd-btn')) {
      const cmd = e.target.dataset.cmd;
      if (currentPrompt) {
        currentPrompt.input.value = cmd;
        currentPrompt.input.focus();
        runCommand(cmd);
      }
    }
  });

  // Click anywhere in terminal body to focus input
  terminal.addEventListener('click', e => {
    if (currentPrompt) currentPrompt.input.focus();
  });

  // ─── Boot Sequence ───
  const bootLines = [
    { text: 'PolyBot v3.0.0 — Risk-First Copy Trading', cls: 'cyan', speed: 18 },
    { text: '══════════════════════════════════════════', cls: 'dim', speed: 8 },
    { text: '[INIT] Loading configuration...', cls: 'gray', speed: 14 },
    { text: '[INIT] Connecting to TheGraph API...', cls: 'gray', speed: 14 },
    { text: '  -> Subgraph: polymarket-mainnet', cls: 'dim', speed: 10 },
    { text: '  -> Status: <span class="green">CONNECTED</span>', cls: '', speed: 12 },
    { text: '[INIT] Connecting to Polymarket API...', cls: 'gray', speed: 14 },
    { text: '  -> Endpoint: https://polymarket.com/api', cls: 'dim', speed: 10 },
    { text: '  -> Status: <span class="green">CONNECTED</span>', cls: '', speed: 12 },
    { text: '[INIT] Loading risk module...', cls: 'gray', speed: 14 },
    { text: '  -> Daily loss limit: 10%', cls: 'dim', speed: 10 },
    { text: '  -> Max positions: 5', cls: 'dim', speed: 10 },
    { text: '  -> Max loss/trade: 2%', cls: 'dim', speed: 10 },
    { text: '  -> Status: <span class="green">ACTIVE</span>', cls: '', speed: 12 },
    { text: '[INIT] Loading portfolio tracker...', cls: 'gray', speed: 14 },
    { text: '  -> Bankroll: $10,000.00', cls: 'dim', speed: 10 },
    { text: '  -> Active positions: 3/5', cls: 'dim', speed: 10 },
    { text: '  -> Status: <span class="green">LOADED</span>', cls: '', speed: 12 },
    { text: '[INIT] Initializing EV analyzer...', cls: 'gray', speed: 14 },
    { text: '  -> Monte Carlo runs: 10,000', cls: 'dim', speed: 10 },
    { text: '  -> Status: <span class="green">READY</span>', cls: '', speed: 12 },
    { text: '', cls: '', speed: 0 },
    { text: '<span class="green">[OK] All systems operational.</span> Type "help" for commands.', cls: '', speed: 16 },
  ];

  async function boot() {
    for (const item of bootLines) {
      if (!item.text) { addLine(''); continue; }
      if (item.text.includes('<span')) {
        // Contains HTML — type the plain text then replace with HTML after
        const plain = item.text.replace(/<[^>]+>/g, '');
        await typeText(plain, item.speed);
        // Replace last line with HTML version
        const last = terminal.lastElementChild;
        if (last) last.innerHTML = item.text;
      } else {
        await typeText(item.text, item.speed);
        const last = terminal.lastElementChild;
        if (last && item.cls) last.className = 'line ' + item.cls;
      }
    }
    addLine('');
    createPrompt();
  }

  boot();
})();
</script>
</body>
